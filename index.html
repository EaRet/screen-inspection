<body>
    <div class="container">
        <header>
            <h1>屏幕检测专家</h1>
            <p class="subtitle">专业的在线屏幕质量检测工具，支持多种检测模式</p>
        </header>

        <main class="test-grid" aria-label="屏幕检测模式列表">
            <button class="test-card" type="button" data-test="solidColor" aria-label="开始纯色测试">
                <div class="card-icon">🎨</div>
                <div class="card-content">
                    <h3>纯色测试</h3>
                    <p>检测屏幕坏点、亮点和暗点，支持黑、白、红、绿、蓝等多种颜色</p>
                </div>
            </button>

            <button class="test-card" type="button" data-test="lightLeak" aria-label="开始漏光测试">
                <div class="card-icon">💡</div>
                <div class="card-content">
                    <h3>漏光测试</h3>
                    <p>在黑色背景下检测屏幕边缘和角落的漏光情况</p>
                </div>
            </button>

            <button class="test-card" type="button" data-test="interference" aria-label="开始干扰测试">
                <div class="card-icon">📊</div>
                <div class="card-content">
                    <h3>干扰测试</h3>
                    <p>通过网格和条纹图案检测屏幕的像素排列和干扰问题</p>
                </div>
            </button>

            <button class="test-card" type="button" data-test="focus" aria-label="开始对焦测试">
                <div class="card-icon">🎯</div>
                <div class="card-content">
                    <h3>对焦测试</h3>
                    <p>检测屏幕的清晰度和锐度，确保显示内容清晰</p>
                </div>
            </button>

            <button class="test-card" type="button" data-test="breathing" aria-label="开始呼吸效应测试">
                <div class="card-icon">🌊</div>
                <div class="card-content">
                    <h3>呼吸效应</h3>
                    <p>检测屏幕亮度变化是否均匀，是否存在闪烁问题</p>
                </div>
            </button>

            <button class="test-card" type="button" data-test="contrast" aria-label="开始对比度测试">
                <div class="card-icon">⚫⚪</div>
                <div class="card-content">
                    <h3>对比度测试</h3>
                    <p>测试屏幕的黑白对比度和灰度层次表现</p>
                </div>
            </button>

            <button class="test-card" type="button" data-test="grayscale" aria-label="开始色阶测试">
                <div class="card-icon">🌈</div>
                <div class="card-content">
                    <h3>色阶测试</h3>
                    <p>检测屏幕的灰阶过渡是否平滑，是否有色带现象</p>
                </div>
            </button>

            <button class="test-card" type="button" data-test="saturation" aria-label="开始饱和度测试">
                <div class="card-icon">🎨</div>
                <div class="card-content">
                    <h3>饱和度测试</h3>
                    <p>测试屏幕的色彩饱和度和色彩还原能力</p>
                </div>
            </button>
        </main>

        <footer>
            <div class="footer-links">
                <a href="about.html">关于</a>
                <span class="divider">•</span>
                <a href="privacy.html">隐私政策</a>
            </div>
            <p class="footer-text">© 2025 屏幕检测专家 | 作者: ET</p>
        </footer>
    </div>

    <!-- 全屏测试容器 -->
    <div id="fullscreenTest" class="fullscreen-test"></div>

    <script src="js/script.js"></script>
</body>

</html>
